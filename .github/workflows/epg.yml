name: Fetch EPG

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python epg_fetcher.py

      - name: Commit data files
        run: |
          git config user.name "kunani1"
          git config user.email "kunanisaitarun55@gmail.com"
          git add data/*.json
          git commit -m "Update EPG data" || echo "No changes"
          git push
